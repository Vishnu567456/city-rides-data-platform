name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Smoke run pipeline
        run: python -m src.pipeline.run_pipeline --start-date 2025-12-01 --days 1 --rows-per-day 100 --run-id ci-smoke

      - name: Smoke run Prefect flow
        run: python -m src.pipeline.prefect_flow --source synthetic --start-date 2025-12-01 --days 1 --rows-per-day 100 --run-id ci-prefect
